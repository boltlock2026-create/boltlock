<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Escolas · BOLTLOCK</title>
<link rel="icon" href="/escolas/ospequeninos/img/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1419;--panel:#171e26;--panel2:#1e2730;--line:#2a3540;--ink:#e7edf3;--mut:#8a99a8;--brand:#2aa3df;--green:#34c759;--amber:#f5a623;--red:#ff5a5f;--purple:#7d5cff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit}
.hide{display:none!important}

/* login */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;width:100%;max-width:380px}
.lcard h1{font-size:22px;margin-bottom:4px}
.lcard p{color:var(--mut);margin-bottom:22px;font-size:13px}
.lcard label{display:block;font-size:12px;color:var(--mut);margin:12px 0 5px;font-weight:600}
.lcard input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:15px}
.lcard input:focus{outline:none;border-color:var(--brand)}
.lcard button{width:100%;margin-top:20px;padding:13px;background:var(--brand);color:#fff;border-radius:10px;font-weight:700;font-size:15px}
.lerr{color:var(--red);font-size:13px;margin-top:12px;min-height:16px}
.lhint{margin-top:18px;font-size:11px;color:var(--mut);line-height:1.6;border-top:1px solid var(--line);padding-top:14px}

/* app shell */
#app{display:flex;min-height:100vh}
.side{width:220px;background:var(--panel);border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;flex-shrink:0}
.side .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px;margin-bottom:22px;padding:0 6px}
.side .brand img{width:30px;height:30px;border-radius:7px;background:#fff;object-fit:contain}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:11px 12px;background:none;color:var(--mut);border-radius:9px;font-size:14px;font-weight:600;margin-bottom:3px}
.nav button.active{background:var(--panel2);color:var(--ink)}
.nav button:hover{color:var(--ink)}
.side .who{position:absolute;bottom:16px;left:14px;right:14px;font-size:12px;color:var(--mut)}
.side .who button{color:var(--red);background:none;font-size:12px;margin-top:6px;padding:0}
.main{flex:1;padding:26px 30px;max-width:100%;overflow-x:hidden}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.topbar h2{font-size:21px}
.topbar .sp{flex:1}
.btn{padding:9px 16px;background:var(--brand);color:#fff;border-radius:9px;font-weight:600;font-size:13px}
.btn.gray{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn.green{background:var(--green)}
.btn.sm{padding:6px 11px;font-size:12px}

/* cards/stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.stat .v{font-size:26px;font-weight:800}
.stat .l{color:var(--mut);font-size:12px;margin-top:3px}
.stat.green .v{color:var(--green)}.stat.amber .v{color:var(--amber)}.stat.red .v{color:var(--red)}.stat.brand .v{color:var(--brand)}

/* kanban */
.kan{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.col{background:var(--panel);border:1px solid var(--line);border-radius:14px;min-width:240px;width:240px;flex-shrink:0;display:flex;flex-direction:column;max-height:72vh}
.col h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);padding:14px 14px 10px;display:flex;justify-content:space-between}
.col h3 span{background:var(--panel2);border-radius:20px;padding:1px 8px;color:var(--ink)}
.col .body{padding:0 10px 12px;overflow-y:auto;flex:1}
.lead{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;cursor:pointer}
.lead:hover{border-color:var(--brand)}
.lead .n{font-weight:700;font-size:13px}
.lead .c{color:var(--mut);font-size:12px;margin-top:3px}
.lead .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-top:7px;font-weight:600}
.tag.pequeninos{background:rgba(247,144,30,.18);color:#f7901e}
.tag.vilareal{background:rgba(46,177,78,.18);color:#46b14e}

/* table */
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
th,td{text-align:left;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
tr:last-child td{border-bottom:none}
tr.click:hover{background:var(--panel2);cursor:pointer}
.pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.pill.pago{background:rgba(52,199,89,.18);color:var(--green)}
.pill.pendente{background:rgba(245,166,35,.18);color:var(--amber)}
.pill.vencido{background:rgba(255,90,95,.18);color:var(--red)}
.pill.matriculado,.pill.aluno{background:rgba(42,163,223,.18);color:var(--brand)}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:24px}
.modal h3{font-size:18px;margin-bottom:4px}
.modal .sub{color:var(--mut);font-size:12px;margin-bottom:18px}
.modal label{display:block;font-size:12px;color:var(--mut);margin:12px 0 5px;font-weight:600}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:14px}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--brand)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mactions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.section{border-top:1px solid var(--line);margin-top:18px;padding-top:16px}
.section h4{font-size:13px;margin-bottom:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.item{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.item .meta{color:var(--mut);font-size:11px;margin-top:3px}
.codebox{background:var(--bg);border:1px dashed var(--brand);border-radius:9px;padding:10px 14px;font-size:18px;font-weight:800;letter-spacing:2px;color:var(--brand);text-align:center;margin:6px 0}
.empty{color:var(--mut);text-align:center;padding:40px;font-size:13px}
.inline{display:flex;gap:8px;align-items:flex-end}
.inline > div{flex:1}
@media(max-width:760px){.side{position:fixed;z-index:90;transform:translateX(-100%);transition:.2s}.side.open{transform:none}.main{padding:18px}.menubtn{display:block!important}}
.menubtn{display:none;background:var(--panel2);color:var(--ink);padding:8px 12px;border-radius:8px;border:1px solid var(--line)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <h1>CRM Escolas</h1>
    <p>BOLTLOCK · gestão de leads, matrículas e alunos</p>
    <label>E-mail</label>
    <input id="email" type="email" placeholder="pequeninos@boltlock.com" autocomplete="username">
    <label>Senha</label>
    <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
    <button onclick="entrar()">Entrar</button>
    <div class="lerr" id="lerr"></div>
    <div class="lhint">Acessos: <b>pequeninos@boltlock.com</b> · <b>vilareal@boltlock.com</b> · <b>secretaria@boltlock.com</b> (vê as duas)</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <aside class="side" id="side">
    <div class="brand"><img src="/escolas/ospequeninos/img/logo.jpg" alt="">CRM Escolas</div>
    <nav class="nav">
      <button data-v="dash" class="active" onclick="go('dash')">📊 Painel</button>
      <button data-v="funil" onclick="go('funil')">🎯 Funil de Leads</button>
      <button data-v="alunos" onclick="go('alunos')">🎓 Alunos</button>
      <button data-v="financeiro" onclick="go('financeiro')">💰 Financeiro</button>
      <button data-v="whats" onclick="go('whats')">🟢 Disparo de Whats</button>
      <button data-v="sms" onclick="go('sms')">✉️ Disparo de SMS</button>
    </nav>
    <div class="who"><span id="whoName"></span><br><button onclick="sair()">Sair</button></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menubtn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
      <h2 id="vTitle">Painel</h2>
      <div class="sp"></div>
      <button class="btn" id="addBtn" onclick="novoLead()">+ Novo lead</button>
    </div>
    <div id="view"></div>
  </main>
</div>

<div id="modalRoot"></div>

<script>
const API = '/api';
let TOKEN = localStorage.getItem('crm_token') || '';
let USER = JSON.parse(localStorage.getItem('crm_user') || 'null');
let LEADS = [], ALUNOS = [], STATS = null, VIEW = 'dash';
const STAGES = [
  {k:'novo',t:'Novos'},{k:'contato',t:'Em contato'},{k:'visita',t:'Visita agendada'},
  {k:'matricula',t:'Matrícula'},{k:'aluno',t:'Virou aluno'},{k:'perdido',t:'Perdidos'}
];
const fmt = v => 'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
const esc = s => (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const dia = s => s ? new Date(s).toLocaleDateString('pt-BR') : '';
const hoje = new Date().toISOString().slice(0,10);

async function api(path, method='GET', body){
  const r = await fetch(API+path,{method,headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{})},body:body?JSON.stringify(body):undefined});
  if(r.status===401){sair();throw new Error('Sessão expirada');}
  const d = await r.json();
  if(!r.ok) throw new Error(d.erro||'Erro');
  return d;
}
// motor de disparo na VPS (Evolution local + TextBee, seguro/estável como o ENVIA)
const DISPARO='https://enviaai.boltlock.com.br/crmapi';
async function disp(path, method='GET', body){
  const r = await fetch(DISPARO+path,{method,headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{})},body:body?JSON.stringify(body):undefined});
  const d = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.erro||('Erro '+r.status));
  return d;
}

async function entrar(){
  const email=document.getElementById('email').value.trim(), senha=document.getElementById('senha').value;
  const err=document.getElementById('lerr'); err.textContent='';
  try{
    const d=await api('/auth/login','POST',{email,senha});
    TOKEN=d.token; USER=d.usuario;
    localStorage.setItem('crm_token',TOKEN); localStorage.setItem('crm_user',JSON.stringify(USER));
    boot();
  }catch(e){ err.textContent=e.message; }
}
function sair(){localStorage.removeItem('crm_token');localStorage.removeItem('crm_user');TOKEN='';USER=null;location.reload();}

function boot(){
  document.getElementById('login').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('whoName').textContent=USER?.nome||'';
  refresh();
}
async function refresh(){
  try{
    const [l,a,s]=await Promise.all([api('/crm/leads'),api('/crm/alunos'),api('/crm/stats')]);
    LEADS=l.leads||[]; ALUNOS=a.alunos||[]; STATS=s;
  }catch(e){ console.warn(e); }
  render();
}
function go(v){VIEW=v;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));document.getElementById('side').classList.remove('open');render();}

function render(){
  const titles={dash:'Painel',funil:'Funil de Leads',alunos:'Alunos',financeiro:'Financeiro',whats:'Disparo de WhatsApp',sms:'Disparo de SMS'};
  document.getElementById('vTitle').textContent=titles[VIEW];
  document.getElementById('addBtn').classList.toggle('hide', ['financeiro','whats','sms'].includes(VIEW));
  const v=document.getElementById('view');
  if(VIEW==='dash') v.innerHTML=viewDash();
  else if(VIEW==='funil') v.innerHTML=viewFunil();
  else if(VIEW==='alunos') v.innerHTML=viewAlunos();
  else if(VIEW==='financeiro') v.innerHTML=viewFinanceiro();
  else if(VIEW==='whats'){ v.innerHTML=viewWhats(); carregarInstancias(); }
  else if(VIEW==='sms') v.innerHTML=viewSms();
}

/* telefones dos leads/alunos da escola atual */
function telefonesCRM(){
  const ns=[];
  LEADS.forEach(l=>{ if(l.fone) ns.push(l.fone); });
  ALUNOS.forEach(a=>{ if(a.fone) ns.push(a.fone); });
  return Array.from(new Set(ns));
}
function parseNums(txt){ return (txt||'').split(/[\n,;]+/).map(s=>s.trim()).filter(Boolean); }

/* ---------- DISPARO WHATSAPP ---------- */
let WA_INSTANCES=[];
function viewWhats(){
  return `<div class="stats" style="margin-bottom:18px">
    <div class="stat"><div class="v" id="waCount">—</div><div class="l">Instâncias conectadas</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px" id="waGrid">
    <div class="stat" style="padding:18px">
      <h3 style="font-size:15px;margin-bottom:12px">📱 Instância (chip)</h3>
      <label style="font-size:12px;color:var(--mut)">Instância para disparar</label>
      <select id="waInst" style="width:100%;padding:10px;margin:6px 0 12px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)"></select>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn gray sm" onclick="carregarInstancias()">↻ Atualizar</button>
        <button class="btn sm" onclick="novaInstancia()">+ Nova instância (QR)</button>
        <button class="btn gray sm" onclick="removerInstancia()">Desconectar</button>
      </div>
      <div id="waQR" style="margin-top:14px;text-align:center"></div>
    </div>
    <div class="stat" style="padding:18px">
      <h3 style="font-size:15px;margin-bottom:12px">🚀 Disparo</h3>
      <label style="font-size:12px;color:var(--mut)">Tipo</label>
      <select id="waType" onchange="waTipoMuda()" style="width:100%;padding:10px;margin:6px 0 12px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)">
        <option value="text">Texto</option><option value="image">Imagem</option><option value="video">Vídeo</option><option value="audio">Áudio (voz)</option><option value="document">Documento</option>
      </select>
      <div id="waMediaBox" class="hide" style="margin-bottom:10px">
        <label style="font-size:12px;color:var(--mut)">Arquivo</label>
        <input type="file" id="waFile" style="width:100%;margin:6px 0;color:var(--ink);font-size:12px">
        <label style="font-size:12px;color:var(--mut)">ou URL pública (recomendado p/ vídeo grande)</label>
        <input id="waUrl" placeholder="https://..." style="width:100%;padding:9px;margin-top:5px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)">
      </div>
      <label style="font-size:12px;color:var(--mut)" id="waTxtLabel">Mensagem / legenda</label>
      <textarea id="waText" rows="3" style="width:100%;padding:10px;margin:6px 0 12px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)" placeholder="Olá! Temos novidades..."></textarea>
      <label style="font-size:12px;color:var(--mut)">Números (1 por linha) <a href="#" onclick="puxarLeadsWa();return false" style="color:var(--brand)">+ puxar do CRM</a></label>
      <textarea id="waNums" rows="4" style="width:100%;padding:10px;margin:6px 0 12px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)" placeholder="11999990000"></textarea>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
        <label style="font-size:12px;color:var(--mut)">Intervalo (s)</label><input id="waDelay" type="number" value="3" style="width:70px;padding:8px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)">
      </div>
      <button class="btn green" style="width:100%" id="waSendBtn" onclick="dispararWa()">Disparar WhatsApp</button>
      <div id="waResult" style="margin-top:12px;font-size:13px"></div>
    </div>
  </div>`;
}
function waTipoMuda(){ const t=document.getElementById('waType').value; document.getElementById('waMediaBox').classList.toggle('hide', t==='text'); document.getElementById('waTxtLabel').textContent = t==='text'?'Mensagem':'Legenda (opcional)'; }
async function carregarInstancias(){
  try{
    const d=await disp('/wa/instances'); WA_INSTANCES=d.instances||[];
    const sel=document.getElementById('waInst'); if(!sel)return;
    const conn=WA_INSTANCES.filter(i=>i.status==='open');
    document.getElementById('waCount').textContent=conn.length;
    sel.innerHTML=WA_INSTANCES.map(i=>`<option value="${esc(i.name)}">${esc(i.name)} ${i.status==='open'?'🟢 '+esc(i.numero||''):'⚪ '+esc(i.status||'')}</option>`).join('')||'<option value="">nenhuma instância</option>';
  }catch(e){ const r=document.getElementById('waResult'); if(r)r.innerHTML='<span style="color:var(--red)">'+esc(e.message)+'</span>'; }
}
async function novaInstancia(){
  const nome=prompt('Nome da nova instância (ex: escola-pequeninos):'); if(!nome)return;
  const qrbox=document.getElementById('waQR'); qrbox.innerHTML='Gerando QR...';
  try{
    const d=await disp('/wa/instances','POST',{name:nome});
    if(d.qr){ qrbox.innerHTML=`<img src="${d.qr}" style="max-width:230px;border:6px solid #fff;border-radius:10px"><div style="font-size:12px;color:var(--mut);margin-top:6px">Escaneie no WhatsApp → Aparelhos conectados</div>`; pollState(nome); }
    else if(d.pairingCode){ qrbox.innerHTML='Código: <b>'+esc(d.pairingCode)+'</b>'; }
    else qrbox.innerHTML='<span style="color:var(--amber)">Instância criada. Clique Atualizar.</span>';
    setTimeout(carregarInstancias,1500);
  }catch(e){ qrbox.innerHTML='<span style="color:var(--red)">'+esc(e.message)+'</span>'; }
}
async function pollState(nome){
  for(let i=0;i<20;i++){ await new Promise(r=>setTimeout(r,3000));
    try{ const s=await disp('/wa/state/'+encodeURIComponent(nome)); if(s.state==='open'){ document.getElementById('waQR').innerHTML='<span style="color:var(--green);font-weight:700">✅ Conectado!</span>'; carregarInstancias(); return; } }catch(_){}
  }
}
async function removerInstancia(){ const n=document.getElementById('waInst').value; if(!n||!confirm('Desconectar e remover "'+n+'"?'))return; await disp('/wa/instances/'+encodeURIComponent(n),'DELETE'); carregarInstancias(); }
function puxarLeadsWa(){ document.getElementById('waNums').value=telefonesCRM().join('\n'); }
function fileToB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
async function dispararWa(){
  const btn=document.getElementById('waSendBtn'), out=document.getElementById('waResult');
  const instance=document.getElementById('waInst').value;
  const type=document.getElementById('waType').value;
  const numbers=parseNums(document.getElementById('waNums').value);
  const text=document.getElementById('waText').value;
  const delay=Number(document.getElementById('waDelay').value)||2;
  if(!instance){out.innerHTML='<span style="color:var(--red)">Selecione uma instância</span>';return;}
  if(!numbers.length){out.innerHTML='<span style="color:var(--red)">Informe os números</span>';return;}
  let media='';
  if(type!=='text'){
    const url=document.getElementById('waUrl').value.trim(), file=document.getElementById('waFile').files[0];
    if(url) media=url; else if(file){ out.textContent='Carregando arquivo...'; media=await fileToB64(file); } else {out.innerHTML='<span style="color:var(--red)">Anexe arquivo ou URL</span>';return;}
  }
  btn.disabled=true; btn.textContent='Disparando...'; out.textContent='Enviando para '+numbers.length+' número(s)...';
  try{
    const d=await disp('/wa/send','POST',{instance,type,text,caption:text,media,numbers,delay});
    out.innerHTML=`<b style="color:var(--green)">✅ ${d.enviados} enviados</b>${d.falhas?` · <span style="color:var(--red)">${d.falhas} falhas</span>`:''} de ${d.total}`;
  }catch(e){ out.innerHTML='<span style="color:var(--red)">'+esc(e.message)+'</span>'; }
  btn.disabled=false; btn.textContent='Disparar WhatsApp';
}

/* ---------- DISPARO SMS ---------- */
function viewSms(){
  return `<div class="stat" style="padding:20px;max-width:560px">
    <h3 style="font-size:15px;margin-bottom:4px">✉️ Disparo de SMS (TextBee)</h3>
    <p style="color:var(--mut);font-size:12px;margin-bottom:16px">Mensagem de texto direto no celular, sem precisar de WhatsApp.</p>
    <label style="font-size:12px;color:var(--mut)">Mensagem (até ~160 caracteres por SMS)</label>
    <textarea id="smsMsg" rows="3" maxlength="320" style="width:100%;padding:10px;margin:6px 0 12px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)" placeholder="Matrículas abertas na Os Pequeninos! Agende sua visita: ..."></textarea>
    <label style="font-size:12px;color:var(--mut)">Números (1 por linha) <a href="#" onclick="puxarLeadsSms();return false" style="color:var(--brand)">+ puxar do CRM</a></label>
    <textarea id="smsNums" rows="5" style="width:100%;padding:10px;margin:6px 0 12px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)" placeholder="11999990000"></textarea>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px"><label style="font-size:12px;color:var(--mut)">Intervalo (s)</label><input id="smsDelay" type="number" value="2" style="width:70px;padding:8px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--ink)"></div>
    <button class="btn" style="width:100%;background:var(--purple)" id="smsBtn" onclick="dispararSms()">Disparar SMS</button>
    <div id="smsResult" style="margin-top:12px;font-size:13px"></div>
  </div>`;
}
function puxarLeadsSms(){ document.getElementById('smsNums').value=telefonesCRM().join('\n'); }
async function dispararSms(){
  const btn=document.getElementById('smsBtn'), out=document.getElementById('smsResult');
  const message=document.getElementById('smsMsg').value.trim();
  const numbers=parseNums(document.getElementById('smsNums').value);
  const delay=Number(document.getElementById('smsDelay').value)||2;
  if(!message){out.innerHTML='<span style="color:var(--red)">Escreva a mensagem</span>';return;}
  if(!numbers.length){out.innerHTML='<span style="color:var(--red)">Informe os números</span>';return;}
  btn.disabled=true; btn.textContent='Disparando...'; out.textContent='Enviando para '+numbers.length+' número(s)...';
  try{
    const d=await disp('/sms/send','POST',{message,numbers,delay});
    out.innerHTML=`<b style="color:var(--green)">✅ ${d.enviados} enviados</b>${d.falhas?` · <span style="color:var(--red)">${d.falhas} falhas</span>`:''} de ${d.total}`;
  }catch(e){ out.innerHTML='<span style="color:var(--red)">'+esc(e.message)+'</span>'; }
  btn.disabled=false; btn.textContent='Disparar SMS';
}

function viewDash(){
  const s=STATS||{funil:{},financeiro:{}};
  return `<div class="stats">
    <div class="stat brand"><div class="v">${s.totalLeads||0}</div><div class="l">Leads no total</div></div>
    <div class="stat"><div class="v">${s.leadsAtivos||0}</div><div class="l">Leads ativos</div></div>
    <div class="stat green"><div class="v">${s.alunos||0}</div><div class="l">Alunos matriculados</div></div>
    <div class="stat"><div class="v">${s.conversao||0}%</div><div class="l">Taxa de conversão</div></div>
    <div class="stat green"><div class="v">${fmt(s.financeiro?.recebido)}</div><div class="l">Recebido</div></div>
    <div class="stat amber"><div class="v">${fmt(s.financeiro?.receber)}</div><div class="l">A receber</div></div>
    <div class="stat red"><div class="v">${s.financeiro?.vencidos||0}</div><div class="l">Pagamentos vencidos</div></div>
  </div>
  <h3 style="margin:6px 0 12px;font-size:15px">Funil resumido</h3>
  <div class="stats">${STAGES.map(st=>`<div class="stat"><div class="v">${s.funil?.[st.k]||0}</div><div class="l">${st.t}</div></div>`).join('')}</div>`;
}

function viewFunil(){
  return `<div class="kan">${STAGES.map(st=>{
    const items=LEADS.filter(l=>l.stage===st.k);
    return `<div class="col"><h3>${st.t}<span>${items.length}</span></h3><div class="body">
      ${items.map(l=>`<div class="lead" onclick="abrirLead('${l.id}')">
        <div class="n">${esc(l.nome)}</div>
        <div class="c">${esc(l.crianca||'—')}${l.serie?' · '+esc(l.serie):''} · ${esc(l.fone||'')}</div>
        <span class="tag ${l.escola}">${l.escola==='vilareal'?'Vila Real':'Pequeninos'}</span>
      </div>`).join('')||'<div class="empty" style="padding:20px;font-size:12px">vazio</div>'}
    </div></div>`;
  }).join('')}</div>`;
}

function viewAlunos(){
  if(!ALUNOS.length) return '<div class="empty">Nenhum aluno ainda. Converta um lead da etapa Matrícula no Funil.</div>';
  return `<table><thead><tr><th>Aluno</th><th>Responsável</th><th>Escola</th><th>Turma</th><th>Status</th><th>Código pais</th></tr></thead><tbody>
    ${ALUNOS.map(a=>`<tr class="click" onclick="abrirAluno('${a.id}')">
      <td><b>${esc(a.nome)}</b></td><td>${esc(a.responsavel||'')}</td>
      <td><span class="tag ${a.escola}">${a.escola==='vilareal'?'Vila Real':'Pequeninos'}</span></td>
      <td>${esc(a.turma||a.serie||'—')}</td><td><span class="pill ${a.status}">${a.status}</span></td>
      <td><code>${esc(a.codigo||'')}</code></td></tr>`).join('')}
  </tbody></table>`;
}

function viewFinanceiro(){
  const rows=[];
  ALUNOS.forEach(a=>(a.pagamentos||[]).forEach(p=>{
    const venc=p.status!=='pago'&&p.vencimento&&p.vencimento<hoje;
    rows.push({a,p,status:venc?'vencido':p.status});
  }));
  rows.sort((x,y)=>(x.p.vencimento||'').localeCompare(y.p.vencimento||''));
  const s=STATS?.financeiro||{};
  return `<div class="stats">
    <div class="stat green"><div class="v">${fmt(s.recebido)}</div><div class="l">Recebido</div></div>
    <div class="stat amber"><div class="v">${fmt(s.receber)}</div><div class="l">A receber</div></div>
    <div class="stat red"><div class="v">${s.vencidos||0}</div><div class="l">Vencidos</div></div></div>
  ${rows.length?`<table><thead><tr><th>Aluno</th><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Status</th><th></th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${esc(r.a.nome)}</td><td>${esc(r.p.descricao)}</td><td>${fmt(r.p.valor)}</td><td>${dia(r.p.vencimento)}</td>
      <td><span class="pill ${r.status}">${r.status}</span></td>
      <td>${r.p.status!=='pago'?`<button class="btn green sm" onclick="pagar('${r.a.id}','${r.p.id}')">Dar baixa</button>`:'✓'}</td></tr>`).join('')}
  </tbody></table>`:'<div class="empty">Nenhum pagamento lançado. Abra um aluno para adicionar mensalidades.</div>'}`;
}

/* ---------- MODALS ---------- */
function modal(html){document.getElementById('modalRoot').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

function novoLead(){
  if(VIEW==='alunos') return novoAluno();
  modal(`<h3>Novo lead</h3><div class="sub">Cadastro manual no funil</div>
    <label>Nome do responsável</label><input id="f_nome">
    <div class="row2"><div><label>Telefone</label><input id="f_fone"></div><div><label>Criança</label><input id="f_crianca"></div></div>
    <div class="row2"><div><label>Escola</label><select id="f_escola"><option value="pequeninos">Os Pequeninos</option><option value="vilareal">Colégio Vila Real</option></select></div>
    <div><label>Origem</label><input id="f_origem" value="manual"></div></div>
    <label>E-mail</label><input id="f_email">
    <div class="mactions"><button class="btn" onclick="salvarLead()">Salvar</button><button class="btn gray" onclick="closeModal()">Cancelar</button></div>`);
}
async function salvarLead(){
  const b={nome:val('f_nome'),fone:val('f_fone'),crianca:val('f_crianca'),escola:val('f_escola'),origem:val('f_origem'),email:val('f_email')};
  if(!b.nome){alert('Informe o nome');return;}
  await api('/crm/leads','POST',b);closeModal();refresh();
}
const val=id=>document.getElementById(id)?.value.trim();

function abrirLead(id){
  const l=LEADS.find(x=>x.id===id);if(!l)return;
  const hist=(l.historico||[]).slice().reverse();
  modal(`<h3>${esc(l.nome)}</h3><div class="sub">${esc(l.crianca||'')} · ${esc(l.fone||'')} · ${l.escola==='vilareal'?'Vila Real':'Pequeninos'}</div>
    <label>Etapa do funil</label>
    <select id="l_stage">${STAGES.filter(s=>s.k!=='aluno').map(s=>`<option value="${s.k}" ${l.stage===s.k?'selected':''}>${s.t}</option>`).join('')}</select>
    <label>Adicionar anotação</label><textarea id="l_nota" rows="2" placeholder="Ligou, agendou visita p/ sábado..."></textarea>
    <div class="mactions">
      <button class="btn" onclick="salvarLead2('${id}')">Salvar</button>
      <a class="btn green" target="_blank" href="https://wa.me/55${(l.fone||'').replace(/\\D/g,'')}">WhatsApp</a>
      ${l.stage!=='aluno'?`<button class="btn" style="background:var(--purple)" onclick="converter('${id}')">✓ Matricular</button>`:''}
      <button class="btn gray" onclick="delLead('${id}')">Excluir</button>
    </div>
    <div class="section"><h4>Histórico</h4>${hist.map(h=>`<div class="item">${esc(h.txt)}<div class="meta">${dia(h.t)} ${new Date(h.t).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div></div>`).join('')||'<div class="empty" style="padding:14px">sem registros</div>'}</div>`);
}
async function salvarLead2(id){
  const b={stage:val('l_stage')}; const nota=val('l_nota'); if(nota)b.nota=nota;
  await api('/crm/leads/'+id,'PATCH',b);closeModal();refresh();
}
async function delLead(id){if(!confirm('Excluir este lead?'))return;await api('/crm/leads/'+id,'DELETE');closeModal();refresh();}
function converter(id){
  const l=LEADS.find(x=>x.id===id);
  modal(`<h3>Matricular ${esc(l.crianca||l.nome)}</h3><div class="sub">Converter lead em aluno</div>
    <div class="row2"><div><label>Série/Nível</label><input id="c_serie" value="${esc(l.serie||'')}" placeholder="Maternal / 3º ano"></div>
    <div><label>Turma</label><input id="c_turma" placeholder="Manhã A"></div></div>
    <div class="mactions"><button class="btn green" onclick="confirmarConv('${id}')">Confirmar matrícula</button><button class="btn gray" onclick="abrirLead('${id}')">Voltar</button></div>`);
}
async function confirmarConv(id){
  await api('/crm/leads/'+id+'/converter','POST',{serie:val('c_serie'),turma:val('c_turma')});
  closeModal();await refresh();go('alunos');
}

function novoAluno(){
  modal(`<h3>Novo aluno</h3><div class="sub">Cadastro direto (sem passar pelo funil)</div>
    <label>Nome da criança</label><input id="a_nome">
    <div class="row2"><div><label>Responsável</label><input id="a_resp"></div><div><label>Telefone</label><input id="a_fone"></div></div>
    <div class="row2"><div><label>Escola</label><select id="a_escola"><option value="pequeninos">Os Pequeninos</option><option value="vilareal">Colégio Vila Real</option></select></div>
    <div><label>Série/Turma</label><input id="a_serie"></div></div>
    <div class="mactions"><button class="btn" onclick="salvarAluno()">Salvar</button><button class="btn gray" onclick="closeModal()">Cancelar</button></div>`);
}
async function salvarAluno(){
  const b={nome:val('a_nome'),responsavel:val('a_resp'),fone:val('a_fone'),escola:val('a_escola'),serie:val('a_serie'),turma:val('a_serie')};
  if(!b.nome){alert('Informe o nome');return;}
  await api('/crm/alunos','POST',b);closeModal();refresh();
}

function abrirAluno(id){
  const a=ALUNOS.find(x=>x.id===id);if(!a)return;
  modal(`<h3>${esc(a.nome)}</h3><div class="sub">${esc(a.responsavel||'')} · ${esc(a.fone||'')} · ${a.escola==='vilareal'?'Vila Real':'Pequeninos'} · ${esc(a.turma||a.serie||'')}</div>
    <label>Código de acesso dos pais (Portal)</label><div class="codebox">${esc(a.codigo||'—')}</div>
    <div style="font-size:11px;color:var(--mut)">Os pais acessam em <b>boltlock.com.br/escolas/portal</b> com este código.</div>

    <div class="section"><h4>💰 Pagamentos</h4>
      ${(a.pagamentos||[]).map(p=>{const venc=p.status!=='pago'&&p.vencimento&&p.vencimento<hoje;return `<div class="item"><b>${esc(p.descricao)}</b> — ${fmt(p.valor)} <span class="pill ${venc?'vencido':p.status}" style="float:right">${venc?'vencido':p.status}</span><div class="meta">Venc: ${dia(p.vencimento)||'—'} ${p.status!=='pago'?`· <a href="#" onclick="pagar('${id}','${p.id}');return false">dar baixa</a>`:''}</div></div>`;}).join('')||'<div class="empty" style="padding:12px">nenhum</div>'}
      <div class="inline" style="margin-top:8px">
        <div><label>Descrição</label><input id="p_desc" value="Mensalidade"></div>
        <div><label>Valor</label><input id="p_val" type="number" placeholder="0,00"></div>
        <div><label>Vencimento</label><input id="p_venc" type="date"></div>
        <button class="btn sm" onclick="addPag('${id}')">+ Lançar</button>
      </div>
    </div>

    <div class="section"><h4>📝 Notas / Observações</h4>
      ${(a.notas||[]).map(n=>`<div class="item">${esc(n.texto)}<div class="meta">${esc(n.tipo)} · ${dia(n.em)}</div></div>`).join('')||'<div class="empty" style="padding:12px">nenhuma</div>'}
      <div class="inline" style="margin-top:8px"><div><input id="n_txt" placeholder="Boletim, comportamento, recado..."></div><button class="btn sm" onclick="addNota('${id}')">+ Add</button></div>
    </div>

    <div class="section"><h4>🔔 Notificações aos pais</h4>
      ${(a.notificacoes||[]).map(nt=>`<div class="item"><b>${esc(nt.titulo)}</b><br>${esc(nt.msg)}<div class="meta">${dia(nt.em)}</div></div>`).join('')||'<div class="empty" style="padding:12px">nenhuma</div>'}
      <div class="inline" style="margin-top:8px"><div><label>Título</label><input id="av_t" placeholder="Reunião de pais"></div><div><label>Mensagem</label><input id="av_m"></div><button class="btn sm" onclick="addAviso('${id}')">+ Enviar</button></div>
    </div>
    <div class="mactions"><button class="btn gray" onclick="closeModal()">Fechar</button><button class="btn" style="background:var(--red)" onclick="delAluno('${id}')">Excluir aluno</button></div>`);
}
async function addPag(id){
  const b={descricao:val('p_desc'),valor:val('p_val'),vencimento:val('p_venc')};
  if(!b.valor){alert('Informe o valor');return;}
  await api('/crm/alunos/'+id+'/pagamentos','POST',b);await refresh();abrirAluno(id);
}
async function pagar(id,pid){await api('/crm/alunos/'+id+'/pagamentos/'+pid,'PATCH',{status:'pago',pagoEm:new Date().toISOString()});await refresh();if(document.querySelector('.modal'))abrirAluno(id);}
async function addNota(id){const t=val('n_txt');if(!t)return;await api('/crm/alunos/'+id+'/notas','POST',{texto:t});await refresh();abrirAluno(id);}
async function addAviso(id){const t=val('av_t'),m=val('av_m');if(!t&&!m)return;await api('/crm/alunos/'+id+'/notificacoes','POST',{titulo:t,msg:m});await refresh();abrirAluno(id);}
async function delAluno(id){if(!confirm('Excluir aluno?'))return;await api('/crm/alunos/'+id,'DELETE');closeModal();refresh();}

/* init */
if(TOKEN&&USER){boot();}
</script>
</body>
</html>
